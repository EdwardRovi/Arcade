<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade · Juegos de Cartas · Multijugador</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#06080f;font-family:'Cinzel',serif;color:#f5ead8;overflow:hidden;}

#bg{position:fixed;inset:0;z-index:0;}
#fx{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* ── UI ── */
#ui{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.8rem;}

/* ── TITLE ── */
#title{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(2rem,6vw,3.8rem);font-weight:900;
  letter-spacing:.1em;text-align:center;
  background:linear-gradient(180deg,#f5d98a,#c9a84c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(201,168,76,.4));
  transition:filter .5s ease;
}

/* ── CARDS ── */
#cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

.card{
  width:130px;min-height:100px;border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:2px solid transparent;
  padding:.9rem .7rem;text-align:center;
  cursor:default;position:relative;overflow:hidden;
  transition:transform .28s ease,box-shadow .32s ease,opacity .4s ease;
}
.card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(var(--c),.22),transparent 65%);
  opacity:.45;transition:opacity .3s;}
.card-icon{font-size:1.85rem;display:block;margin-bottom:.28rem;position:relative;z-index:1;transition:transform .3s;}
.card-name{font-family:'Cinzel Decorative',cursive;font-size:.5rem;letter-spacing:.12em;
  color:rgba(var(--c),1);filter:brightness(1.5);position:relative;z-index:1;}

/* Dimmed state for non-hovered */
.card.dimmed{opacity:.35;filter:saturate(.3);}

/* Active card: RGB border */
.card.active{
  transform:translateY(-8px) scale(1.04);
  animation:rgbBorder 2.5s linear infinite;
}
.card.active::before{opacity:.9;}
@keyframes rgbBorder{
  0%  {box-shadow:0 0 0 2px rgba(var(--c),1),0 14px 48px rgba(var(--c),.35),0 0 20px rgba(var(--c),.4);}
  33% {box-shadow:0 0 0 2px rgba(var(--c),1),0 14px 55px rgba(var(--c),.5),0 0 35px rgba(var(--c),.6);}
  66% {box-shadow:0 0 0 2px rgba(var(--c),.6),0 14px 48px rgba(var(--c),.35),0 0 20px rgba(var(--c),.3);}
  100%{box-shadow:0 0 0 2px rgba(var(--c),1),0 14px 48px rgba(var(--c),.35),0 0 20px rgba(var(--c),.4);}
}
/* UNO special: 4-color border */
.card.uno.active{
  animation:unoRgb 2s linear infinite !important;
}
@keyframes unoRgb{
  0%  {box-shadow:0 0 0 2.5px #e03030,0 14px 55px rgba(224,48,48,.4),0 0 28px rgba(224,48,48,.5);}
  25% {box-shadow:0 0 0 2.5px #e0b020,0 14px 55px rgba(224,176,32,.4),0 0 28px rgba(224,176,32,.5);}
  50% {box-shadow:0 0 0 2.5px #20a040,0 14px 55px rgba(32,160,64,.4),0 0 28px rgba(32,160,64,.5);}
  75% {box-shadow:0 0 0 2.5px #2060e0,0 14px 55px rgba(32,96,224,.4),0 0 28px rgba(32,96,224,.5);}
  100%{box-shadow:0 0 0 2.5px #e03030,0 14px 55px rgba(224,48,48,.4),0 0 28px rgba(224,48,48,.5);}
}

.mus      {--c:39,180,80;}
.caida    {--c:60,140,230;}
.poker    {--c:220,60,60;}
.sol      {--c:168,85,247;}
.uno      {--c:224,48,48;}
.chinchon {--c:201,168,76;}

#footer{font-size:.52rem;color:rgba(201,168,76,.3);letter-spacing:.2em;text-align:center;transition:color .5s;}

/* ── RGB DIVIDER ── */
#divider-wrap{width:min(600px,88vw);}
#divider-bar{
  height:3px;border-radius:2px;position:relative;overflow:hidden;
  background:rgba(255,255,255,0.06);
}
#divider-inner{
  position:absolute;inset:0;border-radius:2px;
  background:linear-gradient(90deg,
    rgba(39,180,80,1),rgba(60,140,230,1),rgba(220,60,60,1),
    rgba(168,85,247,1),rgba(224,80,30,1),rgba(201,168,76,1),
    rgba(39,180,80,1));
  background-size:200% 100%;
  animation:barFlow 3s linear infinite;
  transition:background 0.6s ease;
}
@keyframes barFlow{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fx"></canvas>

<div id="ui">
  <div id="title">ARCADE</div>
  <div id="divider-wrap">
    <div id="divider-bar"><div id="divider-inner"></div></div>
  </div>
  <div id="cards">
    <div class="card mus"      data-game="mus"      onmouseenter="onHover(this)" onmouseleave="onLeave()"><span class="card-icon">🃏</span><div class="card-name">MUS</div></div>
    <div class="card caida"    data-game="caida"    onmouseenter="onHover(this)" onmouseleave="onLeave()"><span class="card-icon">🎴</span><div class="card-name">CAÍDA</div></div>
    <div class="card poker"    data-game="poker"    onmouseenter="onHover(this)" onmouseleave="onLeave()"><span class="card-icon">♠</span><div class="card-name">PÓKER</div></div>
    <div class="card sol"      data-game="solitario" onmouseenter="onHover(this)" onmouseleave="onLeave()"><span class="card-icon">🕷️</span><div class="card-name">SOLITARIO</div></div>
    <div class="card uno"      data-game="uno"      onmouseenter="onHover(this)" onmouseleave="onLeave()">
      <span class="card-icon" style="font-family:'Cinzel Decorative',cursive;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#e03030,#e0b020,#20a040,#2060e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-bottom:.28rem;position:relative;z-index:1">UNO</span>
      <div class="card-name">UNO</div>
    </div>
    <div class="card chinchon" data-game="chinchon" onmouseenter="onHover(this)" onmouseleave="onLeave()">
      <span class="card-icon" style="font-size:1.4rem;position:relative;z-index:1;display:block;margin-bottom:.28rem;font-family:'Cinzel Decorative',cursive;color:#e8c97a;text-shadow:0 0 12px rgba(201,168,76,0.7)">7&#9827;</span>
      <div class="card-name">CHINCHÓN</div>
    </div>
  </div>
  <div id="footer">QUE GANE EL MEJOR</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const MODES = {
  mus:       { name:'MUS',       color:[39,180,80],   titleColor:'#7bc47b', footerColor:'rgba(39,180,80,.4)'  },
  caida:     { name:'CAÍDA',     color:[60,140,230],  titleColor:'#6ab0e8', footerColor:'rgba(60,140,230,.4)' },
  poker:     { name:'PÓKER',     color:[220,60,60],   titleColor:'#e87a7a', footerColor:'rgba(220,60,60,.4)'  },
  solitario: { name:'SOLITARIO', color:[168,85,247],  titleColor:'#c084fc', footerColor:'rgba(168,85,247,.4)' },
  uno:       { name:'UNO',       color:[220,60,60],   titleColor:'rainbow', footerColor:'rgba(200,60,60,.4)'  },
  chinchon:  { name:'CHINCHÓN',  color:[201,168,76],  titleColor:'#e8c97a', footerColor:'rgba(201,168,76,.4)' },
};

// ── BG CANVAS ───────────────────────────────────────────────────
const bgC=document.getElementById('bg'), bgX=bgC.getContext('2d');
let BW,BH;
function resizeBg(){BW=bgC.width=window.innerWidth;BH=bgC.height=window.innerHeight;}
window.addEventListener('resize',resizeBg); resizeBg();

// Animated background blobs — base + per-mode tint
const blobs=[
  {x:.10,y:.45,r:.60,base:[18,140,42], sx:.00044,sy:.00030,ph:0   },
  {x:.90,y:.42,r:.58,base:[15,80,200], sx:.00034,sy:.00038,ph:1.8 },
  {x:.50,y:1.0,r:.62,base:[200,20,20], sx:.00028,sy:.00035,ph:3.4 },
  {x:.50,y:.02,r:.55,base:[130,50,240],sx:.00032,sy:.00042,ph:5.1 },
  {x:.25,y:.80,r:.42,base:[200,140,10],sx:.00038,sy:.00024,ph:2.8 },
  {x:.75,y:.78,r:.40,base:[220,80,20], sx:.00030,sy:.00034,ph:4.2 },
];
// Current tint (lerps toward target)
let tintR=0,tintG=0,tintB=0,tintA=0;
let targetR=0,targetG=0,targetB=0,targetA=0;

function lerp(a,b,t){return a+(b-a)*t;}

function bgTick(ts){
  requestAnimationFrame(bgTick);
  const t=ts||0;
  // Lerp tint
  const sp=0.04;
  tintR=lerp(tintR,targetR,sp); tintG=lerp(tintG,targetG,sp);
  tintB=lerp(tintB,targetB,sp); tintA=lerp(tintA,targetA,sp);

  bgX.clearRect(0,0,BW,BH);
  bgX.fillStyle='#06080f'; bgX.fillRect(0,0,BW,BH);

  blobs.forEach(b=>{
    const ox=Math.sin(t*b.sx+b.ph)*.30;
    const oy=Math.cos(t*b.sy+b.ph+1.3)*.24;
    const bx=(b.x+ox)*BW, by=(b.y+oy)*BH;
    const br=b.r*Math.min(BW,BH);
    const grd=bgX.createRadialGradient(bx,by,0,bx,by,br);
    grd.addColorStop(0,`rgba(${b.base},0.55)`);
    grd.addColorStop(.5,`rgba(${b.base},0.22)`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=grd; bgX.fillRect(0,0,BW,BH);
  });

  // Mode tint overlay
  if(tintA>0.01){
    const grd=bgX.createRadialGradient(BW/2,BH/2,0,BW/2,BH/2,Math.max(BW,BH)*.75);
    grd.addColorStop(0,`rgba(${Math.round(tintR)},${Math.round(tintG)},${Math.round(tintB)},${(tintA*.80).toFixed(3)})`);
    grd.addColorStop(.55,`rgba(${Math.round(tintR)},${Math.round(tintG)},${Math.round(tintB)},${(tintA*.35).toFixed(3)})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=grd; bgX.fillRect(0,0,BW,BH);
  }

  // Vignette
  const vig=bgX.createRadialGradient(BW/2,BH/2,0,BW/2,BH/2,Math.max(BW,BH)*.72);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.72)');
  bgX.fillStyle=vig; bgX.fillRect(0,0,BW,BH);
}
bgTick(0);

// ── FX CANVAS ───────────────────────────────────────────────────
const fxC=document.getElementById('fx'), fxX=fxC.getContext('2d');
let FW,FH;
function resizeFx(){FW=fxC.width=window.innerWidth;FH=fxC.height=window.innerHeight;}
window.addEventListener('resize',resizeFx); resizeFx();

let currentFx=null, fxParticles=[], fxInterval=null;
const webPhase={tl:0,tr:0,bl:0,br:0};

// ── HOVER LOGIC ─────────────────────────────────────────────────
const titleEl  = document.getElementById('title');
const footerEl = document.getElementById('footer');
const allCards = document.querySelectorAll('.card');

function onHover(el){
  const game = el.dataset.game;
  if(currentFx===game) return;
  stopFx();
  currentFx = game;

  // Cards: dim others, activate this
  allCards.forEach(c=>{
    c.classList.remove('active','dimmed');
    if(c===el) c.classList.add('active');
    else c.classList.add('dimmed');
  });

  // Title → game name with color
  const cfg = MODES[game];
  titleEl.style.background='none';
  titleEl.style.webkitTextFillColor=cfg.titleColor;
  titleEl.style.filter=`drop-shadow(0 0 30px ${cfg.titleColor}) drop-shadow(0 0 60px ${cfg.titleColor}55)`;
  // UNO special: rainbow title
  if(cfg.titleColor==='rainbow'){
    titleEl.style.background='linear-gradient(135deg,#e03030,#e0b020,#20a040,#2060e0)';
    titleEl.style.webkitBackgroundClip='text';
    titleEl.style.webkitTextFillColor='transparent';
    titleEl.style.backgroundClip='text';
    titleEl.style.filter='drop-shadow(0 0 30px rgba(224,80,30,.7)) drop-shadow(0 0 60px rgba(32,96,224,.4))';
  }
  titleEl.textContent = cfg.name;
  footerEl.style.color = cfg.footerColor;

  // BG tint
  const [r,g,b]=cfg.color;
  targetR=r; targetG=g; targetB=b; targetA=1;
  // Bar: transition to mode color
  const c1=`rgba(${r},${g},${b},1)`;
  const c2=`rgba(${Math.min(255,r+70)},${Math.min(255,g+70)},${Math.min(255,b+70)},1)`;
  const c3=`rgba(${Math.max(0,r-50)},${Math.max(0,g-50)},${Math.max(0,b-50)},1)`;
  document.getElementById('divider-inner').style.background=
    `linear-gradient(90deg,${c3},${c1},${c2},${c1},${c2},${c1},${c3})`;

  // Start effect
  if(game==='mus')       initMus();
  else if(game==='caida')     initCaida();
  else if(game==='poker')     initPoker();
  else if(game==='solitario') initSol();
  else if(game==='uno')       initUno();
  else if(game==='chinchon')  initChinchon();
}

function onLeave(){
  stopFx();
  allCards.forEach(c=>c.classList.remove('active','dimmed'));
  // Restore title
  titleEl.style.background='linear-gradient(180deg,#f5d98a,#c9a84c)';
  titleEl.style.webkitBackgroundClip='text';
  titleEl.style.webkitTextFillColor='transparent';
  titleEl.style.backgroundClip='text';
  titleEl.style.filter='drop-shadow(0 0 28px rgba(201,168,76,.4))';
  titleEl.textContent='ARCADE';
  footerEl.style.color='rgba(201,168,76,.3)';
  targetR=0; targetG=0; targetB=0; targetA=0;
  document.getElementById('divider-inner').style.background=
    'linear-gradient(90deg,rgba(39,180,80,1),rgba(60,140,230,1),rgba(220,60,60,1),rgba(168,85,247,1),rgba(224,80,30,1),rgba(201,168,76,1),rgba(39,180,80,1))';
}

function stopFx(){
  currentFx=null;
  clearInterval(fxInterval); fxInterval=null;
  fxParticles.forEach(p=>p.dying=true);
}

// ── EFFECTS ─────────────────────────────────────────────────────

// MUS: letters/words floating up from bottom
function initMus(){
  const WORDS=['MUS','GRANDE','CHICA','PARES','JUEGO','ÓRDAGO','3','7','1','K','♣','♠'];
  const G='rgba(39,180,80,';
  function spawn(){
    if(currentFx!=='mus') return;
    const word=WORDS[Math.floor(Math.random()*WORDS.length)];
    const ms=3000+Math.random()*3000;
    fxParticles.push({
      type:'floatWord', sym:word,
      x:FW*(.08+Math.random()*.84),
      y:FH+30,
      vy:-(FH*(.4+Math.random()*.35))/ms*1000,
      vx:(Math.random()-.5)*18,
      sz:.7+Math.random()*1.8,
      col:G, ms, born:Date.now(), peak:.12+Math.random()*.18, dying:false
    });
  }
  for(let i=0;i<10;i++) setTimeout(spawn,i*160);
  fxInterval=setInterval(spawn,300);
}

// CAÍDA: water ripples from random spots
function initCaida(){
  function spawn(){
    if(currentFx!=='caida') return;
    fxParticles.push({
      type:'ripple',
      x:FW*(.2+Math.random()*.6), y:FH*(.25+Math.random()*.5),
      maxR:100+Math.random()*130, ms:1800+Math.random()*600,
      born:Date.now(), dying:false
    });
  }
  spawn(); spawn();
  fxInterval=setInterval(spawn,550);
}

// POKER: chips rolling from sides
function initPoker(){
  const CHIP_COLS=['#c0392b','#2980b9','#27ae60','#1a1a40','#e8c97a'];
  function spawn(){
    if(currentFx!=='poker') return;
    const fromLeft=Math.random()<.5;
    const cy=FH*(.3+Math.random()*.45);
    fxParticles.push({
      type:'chip',
      x:fromLeft?-32:FW+32, y:cy,
      tx:FW/2+(-90+Math.random()*180), ty:cy+(Math.random()-.5)*55,
      col:CHIP_COLS[Math.floor(Math.random()*CHIP_COLS.length)],
      sz:17+Math.random()*13, rotSpeed:(Math.random()-.5)*7,
      ms:1300+Math.random()*600, born:Date.now(), dying:false, fromLeft
    });
  }
  for(let i=0;i<4;i++) setTimeout(spawn,i*150);
  fxInterval=setInterval(spawn,310);
}

// SOLITARIO: webs grow from corners
function initSol(){
  fxParticles=[{type:'web',born:Date.now(),ms:99999,dying:false}];
  Object.keys(webPhase).forEach(k=>webPhase[k]=0);
}

// UNO: UNO cards fall from top
function initUno(){
  const CARD_FACES=[
    {val:'+2',bg:'#e03030'},{val:'+4',bg:'#1a1a1a'},{val:'↺',bg:'#e0b020'},
    {val:'⊘',bg:'#20a040'},{val:'7',bg:'#2060e0'},{val:'3',bg:'#e03030'},
    {val:'1',bg:'#20a040'},{val:'5',bg:'#e0b020'},{val:'9',bg:'#2060e0'},
  ];
  function spawn(){
    if(currentFx!=='uno') return;
    const face=CARD_FACES[Math.floor(Math.random()*CARD_FACES.length)];
    fxParticles.push({
      type:'unoCard',
      x:FW*(.04+Math.random()*.92), y:-80,
      vy:130+Math.random()*100,
      vx:(Math.random()-.5)*30,
      rot:(-30+Math.random()*60),
      rotV:(Math.random()-.5)*100,
      face, w:44, h:64,
      ms:2800+Math.random()*800,
      born:Date.now(), dying:false
    });
  }
  for(let i=0;i<12;i++) setTimeout(spawn,i*80);
  fxInterval=setInterval(spawn,180);
}

// CHINCHÓN: gold coins rain
function initChinchon(){
  const SYMS=['🪙','7','♠','♥','👑','R'];
  function spawn(){
    if(currentFx!=='chinchon') return;
    fxParticles.push({
      type:'coin',
      x:FW*(.03+Math.random()*.94), y:-30,
      vy:90+Math.random()*110, vx:(Math.random()-.5)*38,
      rot:Math.random()*360, rotV:(Math.random()-.5)*280,
      scalePhase:Math.random()*Math.PI*2,
      sz:16+Math.random()*14,
      sym:SYMS[Math.floor(Math.random()*SYMS.length)],
      ms:2400+Math.random()*900, born:Date.now(), dying:false
    });
  }
  for(let i=0;i<7;i++) setTimeout(spawn,i*110);
  fxInterval=setInterval(spawn,230);
}

// ── MAIN FX TICK ────────────────────────────────────────────────
function fxTick(){
  requestAnimationFrame(fxTick);
  fxX.clearRect(0,0,FW,FH);
  const now=Date.now();

  // Web growth
  if(currentFx==='solitario'){
    Object.keys(webPhase).forEach(k=>{webPhase[k]=Math.min(1,webPhase[k]+.004);});
  } else {
    Object.keys(webPhase).forEach(k=>{webPhase[k]=Math.max(0,webPhase[k]-.018);});
  }
  const anyWeb=Object.values(webPhase).some(v=>v>0);
  if(anyWeb) drawWebs();

  // Clean dead
  fxParticles=fxParticles.filter(p=>{
    if(p.type==='web') return anyWeb;
    if(p.dying) return false;
    const age=Date.now()-p.born;
    return age<(p.ms+300);
  });

  fxParticles.forEach(p=>{
    if(p.type==='web') return;
    const age=now-p.born;
    const t=Math.min(1,age/p.ms);
    if(p.type==='ripple')   drawRipple(p,t);
    else if(p.type==='chip')     drawChip(p,t,age);
    else if(p.type==='coin')     drawCoin(p,t,age);
    else if(p.type==='unoCard')  drawUnoCard(p,t,age);
    else if(p.type==='floatWord') drawFloatWord(p,t,age);
  });
}
fxTick();

// ── DRAW FUNCTIONS ───────────────────────────────────────────────

function drawFloatWord(p,t,age){
  const elapsed=age/1000;
  const x=p.x+p.vx*elapsed;
  const y=p.y+p.vy*elapsed;
  const op=t<.12?t/.12:t>.78?(1-t)/.22:1;
  fxX.save();
  fxX.globalAlpha=op*p.peak;
  fxX.font=`bold ${p.sz}rem "Cinzel Decorative",cursive`;
  fxX.fillStyle=p.col+'0.9)';
  fxX.textAlign='center'; fxX.textBaseline='middle';
  fxX.fillText(p.sym,x,y);
  fxX.restore();
  if(y<-40) p.dying=true;
}

function drawRipple(p,t){
  const r=p.maxR*t;
  const op=(t<.1?t/.1:1-t)*.6;
  fxX.save();
  fxX.globalAlpha=op;
  fxX.strokeStyle='rgba(60,140,230,0.85)';
  fxX.lineWidth=2.5*(1-t*.7);
  fxX.beginPath();
  fxX.ellipse(p.x,p.y,r,r*.36,0,0,Math.PI*2);
  fxX.stroke();
  if(t>0.15){
    fxX.globalAlpha=op*.4; fxX.lineWidth=1.2;
    fxX.beginPath();
    fxX.ellipse(p.x,p.y,r*.55,r*.55*.36,0,0,Math.PI*2);
    fxX.stroke();
  }
  fxX.restore();
}

function drawChip(p,t,age){
  const ease=1-Math.pow(1-t,3);
  const x=p.x+(p.tx-p.x)*ease;
  const y=p.y+(p.ty-p.y)*ease+Math.sin(t*Math.PI)*-18;
  const op=t<.1?t/.1:t>.85?(1-t)/.15:1;
  const rot=(p.rotSpeed*age/1000)%(Math.PI*2);
  fxX.save();
  fxX.globalAlpha=op*.88;
  fxX.translate(x,y); fxX.rotate(rot);
  fxX.beginPath();
  fxX.ellipse(0,0,p.sz,p.sz*.38,0,0,Math.PI*2);
  fxX.fillStyle=p.col; fxX.fill();
  fxX.strokeStyle='rgba(255,255,255,0.3)'; fxX.lineWidth=1.5; fxX.stroke();
  fxX.strokeStyle='rgba(255,255,255,0.15)'; fxX.lineWidth=3;
  for(let i=0;i<3;i++){
    const a=i/3*Math.PI;
    fxX.beginPath();
    fxX.moveTo(Math.cos(a)*p.sz*.6,Math.sin(a)*p.sz*.23);
    fxX.lineTo(Math.cos(a+Math.PI)*p.sz*.6,Math.sin(a+Math.PI)*p.sz*.23);
    fxX.stroke();
  }
  fxX.restore();
}

function drawWebs(){
  const corners=[
    {cx:0, cy:0, fx:1, fy:1, p:webPhase.tl},
    {cx:FW,cy:0, fx:-1,fy:1, p:webPhase.tr},
    {cx:0, cy:FH,fx:1, fy:-1,p:webPhase.bl},
    {cx:FW,cy:FH,fx:-1,fy:-1,p:webPhase.br},
  ];
  corners.forEach(({cx,cy,fx,fy,p})=>{
    if(p<=0) return;
    const size=Math.min(FW,FH)*.4*p;
    fxX.save(); fxX.globalAlpha=p*.55;
    fxX.strokeStyle='rgba(168,85,247,0.75)';
    [0,18,36,54,72,88].forEach(a=>{
      const rad=a*Math.PI/180;
      fxX.lineWidth=.8; fxX.beginPath();
      fxX.moveTo(cx,cy);
      fxX.lineTo(cx+Math.cos(rad)*size*fx,cy+Math.sin(rad)*size*fy);
      fxX.stroke();
    });
    [.22,.42,.62,.82,1].forEach(f=>{
      const pts=[0,18,36,54,72,88].map(a=>{
        const rad=a*Math.PI/180;
        return [cx+Math.cos(rad)*size*f*fx, cy+Math.sin(rad)*size*f*fy];
      });
      fxX.lineWidth=.6; fxX.beginPath();
      fxX.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(([x,y])=>fxX.lineTo(x,y));
      fxX.stroke();
    });
    fxX.restore();
  });
}



function rRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawUnoCard(p,t,age){
  const elapsed=age/1000;
  const x=p.x+p.vx*elapsed;
  const y=p.y+p.vy*elapsed+.5*160*elapsed*elapsed;
  const op=t<.08?t/.08:t>.82?(1-t)/.18:1;
  const rot=(p.rot+p.rotV*elapsed)*Math.PI/180;
  fxX.save();
  fxX.globalAlpha=Math.max(0,op)*.92;
  fxX.translate(x,y); fxX.rotate(rot);
  const w=p.w, h=p.h;
  rRect(fxX,-w/2,-h/2,w,h,5);
  fxX.fillStyle=p.face.bg; fxX.fill();
  fxX.strokeStyle='rgba(255,255,255,0.75)'; fxX.lineWidth=2; fxX.stroke();
  // Oval
  fxX.beginPath();
  fxX.ellipse(0,0,w*.32,h*.4,Math.PI/4,0,Math.PI*2);
  fxX.fillStyle='rgba(255,255,255,0.16)'; fxX.fill();
  // Value
  fxX.fillStyle='#fff';
  const vStr=String(p.face.val);
  fxX.font=`bold ${vStr.length>2?9:vStr.length>1?11:15}px Arial Black,Arial,sans-serif`;
  fxX.textAlign='center'; fxX.textBaseline='middle';
  fxX.fillText(vStr,0,0);
  fxX.font='bold 8px Arial,sans-serif';
  fxX.fillText(vStr,-w/2+7,-h/2+8);
  fxX.restore();
  if(y>FH+80) p.dying=true;
}

function drawCoin(p,t,age){
  const elapsed=age/1000;
  const gravity=200;
  const x=p.x+p.vx*elapsed;
  const y=p.y+p.vy*elapsed+.5*gravity*elapsed*elapsed;
  const op=t<.08?t/.08:t>.82?(1-t)/.18:1;
  const flipScale=Math.cos(p.scalePhase+elapsed*5.5);
  const rot=(p.rot+p.rotV*elapsed)*Math.PI/180;
  fxX.save();
  fxX.globalAlpha=op*.92;
  fxX.translate(x,y); fxX.rotate(rot);
  fxX.scale(Math.abs(flipScale)||.01,1);
  fxX.beginPath();
  fxX.arc(0,0,p.sz,0,Math.PI*2);
  const grd=fxX.createRadialGradient(-p.sz*.3,-p.sz*.3,0,0,0,p.sz);
  grd.addColorStop(0,'#f5d98a');
  grd.addColorStop(.55,'#c9a84c');
  grd.addColorStop(1,'#7a5010');
  fxX.fillStyle=grd; fxX.fill();
  fxX.strokeStyle='rgba(255,220,100,0.45)'; fxX.lineWidth=1.5; fxX.stroke();
  fxX.fillStyle='rgba(60,30,0,0.75)';
  fxX.font=`bold ${p.sz*.9}px serif`;
  fxX.textAlign='center'; fxX.textBaseline='middle';
  fxX.fillText(p.sym,0,0);
  fxX.restore();
  if(y>FH+50) p.dying=true;
}
